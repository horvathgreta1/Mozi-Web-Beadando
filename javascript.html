    <main class="aloldal-hatter">
        <h2>Filmek adatbázis</h2>
        
        <div class="form-container">
            <h3 id="form-title">Új film hozzáadása</h3>
            <input type="hidden" id="film-id">
            <input type="text" id="film-cim" placeholder="Film címe" required>
            <input type="number" id="film-ev" placeholder="Kiadás éve (pl. 1932)" required>
            <input type="number" id="film-hossz" placeholder="Hossz (perc)" required>
            <button onclick="mentes()">Mentés</button>
            <button onclick="urlapTorles()">Mégse</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Cím</th>
                    <th>Év</th>
                    <th>Hossz (perc)</th>
                    <th>Műveletek</th>
                </tr>
            </thead>
            <tbody id="film-tabla-body">
                </tbody>
